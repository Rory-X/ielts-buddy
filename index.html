<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IELTS Buddy - 学习总览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f0f4f8;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
    color: #2d3748;
    line-height: 1.6;
  }
  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  .header {
    background: linear-gradient(135deg, #2563eb, #3b82f6);
    color: #fff;
    padding: 32px 24px;
    border-radius: 12px;
    text-align: center;
    margin-bottom: 24px;
  }
  .header h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
  .header .subtitle { font-size: 14px; opacity: 0.85; }
  .card {
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
    padding: 20px 24px;
    margin-bottom: 20px;
  }
  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: #1e40af;
    margin-bottom: 14px;
    padding-bottom: 8px;
    border-bottom: 2px solid #dbeafe;
  }
  /* 统计卡片 */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
  }
  .stat-card {
    background: #f8fafc;
    border: 1px solid #e2e8f0;
    border-radius: 8px;
    padding: 14px;
    text-align: center;
  }
  .stat-value {
    font-size: 28px;
    font-weight: 700;
    color: #2563eb;
    line-height: 1.2;
  }
  .stat-value.green { color: #059669; }
  .stat-value.amber { color: #d97706; }
  .stat-label {
    font-size: 12px;
    color: #64748b;
    margin-top: 4px;
  }
  .streak-badge {
    display: inline-block;
    background: #fef3c7;
    color: #92400e;
    font-size: 13px;
    font-weight: 600;
    padding: 4px 14px;
    border-radius: 12px;
    margin-top: 12px;
  }
  /* 日历热力图 */
  .calendar-wrapper {
    overflow-x: auto;
  }
  .calendar {
    display: grid;
    grid-template-rows: repeat(7, 14px);
    grid-auto-flow: column;
    grid-auto-columns: 14px;
    gap: 3px;
  }
  .cal-day {
    width: 14px;
    height: 14px;
    border-radius: 2px;
    background: #ebedf0;
  }
  .cal-day[data-level="0"] { background: #ebedf0; }
  .cal-day[data-level="1"] { background: #9ecbff; }
  .cal-day[data-level="2"] { background: #5ba3f5; }
  .cal-day[data-level="3"] { background: #2563eb; }
  .cal-day[data-level="4"] { background: #1d4ed8; }
  .cal-day:hover {
    outline: 1px solid #64748b;
    outline-offset: -1px;
  }
  a.cal-day { cursor: pointer; }
  .cal-legend {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-size: 11px;
    color: #64748b;
  }
  .cal-legend-box {
    width: 12px;
    height: 12px;
    border-radius: 2px;
    display: inline-block;
  }
  .cal-weekdays {
    display: grid;
    grid-template-rows: repeat(7, 14px);
    gap: 3px;
    margin-right: 6px;
    font-size: 10px;
    color: #94a3b8;
    line-height: 14px;
  }
  .cal-container {
    display: flex;
    align-items: flex-start;
  }
  /* 最近记录表格 */
  .recent-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }
  .recent-table th {
    text-align: left;
    padding: 8px 10px;
    background: #f1f5f9;
    color: #475569;
    font-weight: 600;
    border-bottom: 2px solid #e2e8f0;
  }
  .recent-table td {
    padding: 8px 10px;
    border-bottom: 1px solid #f1f5f9;
  }
  .recent-table tr:last-child td { border-bottom: none; }
  .recent-table a {
    color: #2563eb;
    text-decoration: none;
  }
  .recent-table a:hover { text-decoration: underline; }
  .date-dim { color: #94a3b8; }
  /* Band 进度 */
  .progress-item { margin-bottom: 10px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 13px;
    color: #64748b;
    margin-bottom: 4px;
  }
  .progress-bar {
    background: #e2e8f0;
    border-radius: 6px;
    height: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #3b82f6, #2563eb);
  }
  .empty-msg { color: #94a3b8; font-style: italic; padding: 8px 0; }
  .footer {
    text-align: center;
    padding: 16px;
    font-size: 12px;
    color: #94a3b8;
  }
  @media (max-width: 480px) {
    .container { padding: 12px 8px; }
    .header { padding: 20px 16px; }
    .card { padding: 16px; }
    .stats-grid { grid-template-columns: repeat(2, 1fr); }
    .stat-value { font-size: 22px; }
  }
</style>
